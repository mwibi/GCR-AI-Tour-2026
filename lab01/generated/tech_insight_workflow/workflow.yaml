# Tech Insight Workflow - RSS/站点更新聚合 -> 聚类趋势/公司雷达/工具更新/研究趋势
kind: Workflow
trigger:
  kind: OnConversationStart
  id: tech_insight_workflow
  actions:
    - kind: SendActivity
      id: tech_welcome
      activity: |
        📡 欢迎使用 Tech Insight Workflow！
        目标：从 RSS/Sitemap/HTML 源抓取更新 → 归一为文章信号 → 聚类趋势/公司雷达/工具更新/研究趋势 → 生成可读报告。

    - kind: SetTextVariable
      id: tech_set_language
      variable: Local.Language
      value: "zh-CN"

    - kind: SetTextVariable
      id: tech_set_source_list_path
      variable: Local.SourceListPath
      value: "input/api/rss_list.json"

    - kind: SetTextVariable
      id: tech_set_output_dir
      variable: Local.OutputDir
      value: "{Local.RunOutputDir}"

    - kind: SetTextVariable
      id: tech_set_signals_dir
      variable: Local.SignalsDir
      value: "{Local.RunOutputDir}/signals"

    - kind: SetTextVariable
      id: tech_set_time_window_hours
      variable: Local.TimeWindowHours
      value: "24"

    - kind: SetTextVariable
      id: tech_set_top_k
      variable: Local.TopK
      value: "12"

    - kind: SetTextVariable
      id: tech_set_max_items_per_source
      variable: Local.MaxItemsPerSource
      value: "25"

    - kind: SetTextVariable
      id: tech_set_timeout_seconds
      variable: Local.TimeoutSeconds
      value: "15"

    - kind: SetTextVariable
      id: tech_set_max_chars
      variable: Local.MaxChars
      value: "200000"

    - kind: SendActivity
      id: tech_step1_start
      activity: |
        1/4 抓取信号源中...
        - 源列表: {Local.SourceListPath}
        - 落盘目录: {Local.SignalsDir}

    - kind: SetTextVariable
      id: tech_build_fetch_toolcall
      variable: Local.FetchSignalsToolCall
      value: '{"tool":"tech.fetch_all_to_disk","args":{"source_list_path":"{Local.SourceListPath}","output_dir":"{Local.SignalsDir}","timeout_seconds":{Local.TimeoutSeconds},"max_chars":{Local.MaxChars},"max_items_per_source":{Local.MaxItemsPerSource}}}'

    - kind: InvokeAzureAgent
      id: tech_fetch_signals
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.FetchSignalsToolCall)
      output:
        messages: Local.FetchResult

    - kind: SendActivity
      id: tech_step1_fetch_done
      activity: "✅ 信号源抓取完成，已落盘到 {Local.SignalsDir}"

    - kind: SetTextVariable
      id: tech_build_load_toolcall
      variable: Local.LoadSignalsToolCall
      value: '{"tool":"tech.load_articles_from_disk","args":{"signals_dir":"{Local.SignalsDir}","source_list_path":"{Local.SourceListPath}","max_items_per_source":{Local.MaxItemsPerSource},"time_window_hours":{Local.TimeWindowHours}}}'

    - kind: InvokeAzureAgent
      id: tech_load_signals
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.LoadSignalsToolCall)
      output:
        messages: Local.RawSignals

    - kind: SetTextVariable
      id: tech_save_raw_signals_toolcall
      variable: Local.SaveRawSignalsToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/raw_signals.json","text":"{JsonEscape(MessageText(Local.RawSignals))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: tech_save_raw_signals
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveRawSignalsToolCall)
      output:
        messages: Local.SaveRawSignalsResult

    - kind: SendActivity
      id: tech_step2_start
      activity: |
        2/4 聚类趋势与重点更新中...
        - 目标输出热点数: Top {Local.TopK}

    - kind: SetTextVariable
      id: tech_build_clustering_prompt
      variable: Local.ClusteringPrompt
      value: |
        你是 Tech Hotspot Clustering Agent。
        任务：把过去 {Local.TimeWindowHours} 小时内的文章信号聚合成可行动的主题/更新列表。
        
        ## 输入（严格 JSON）
        {MessageText(Local.RawSignals)}
        
        ## 聚类原则（混合）
        - 先利用结构化元数据分桶：company / signal_level / source_type / include_keywords 派生标签
        - 再在桶内按主题合并（标题 + 摘要 + 链接域名）
        - 需要同时保留两类输出：
          1) cross_source_trends：多来源共振的趋势主题（coverage 高）
          2) high_signal_singles：单来源但信号强（S/A 或官方更新/Release）的重要更新

        ## 强约束
        - 必须输出严格 JSON（不要代码块，不要解释）
        - 每个热点给出 samples（至少 3 条样本，single 允许 1-2 条）
        - 总数最多 {Local.TopK}

        ## 输出格式（严格 JSON）
        {"hotspots": [{"hotspot_id": "H01", "title": "...", "summary": "...", "category": "trend|single", "overall_heat_score": 0, "coverage": {"source_count": 0, "companies": [], "platforms": []}, "should_chase": "yes|no", "chase_rationale": [], "samples": [{"platform": "...", "title": "...", "url": "...", "published_at": "...", "company": "...", "signal_level": "..."}]}]}

    - kind: InvokeAzureAgent
      id: tech_cluster_hotspots_llm
      agent:
        name: HotspotClusteringAgent
      input:
        messages: =UserMessage(Local.ClusteringPrompt)
      output:
        messages: Local.ClustersCandidate

    - kind: SetTextVariable
      id: tech_build_cluster_fallback_toolcall
      variable: Local.ClusterFallbackToolCall
      value: '{"tool":"tech.cluster_or_fallback","args":{"raw_signals_json":"{JsonEscape(MessageText(Local.RawSignals))}","clusters_json":"{JsonEscape(MessageText(Local.ClustersCandidate))}","top_k":{Local.TopK}}}'

    - kind: InvokeAzureAgent
      id: tech_cluster_hotspots
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.ClusterFallbackToolCall)
      output:
        messages: Local.HotspotClusters

    - kind: SetTextVariable
      id: tech_save_clusters_toolcall
      variable: Local.SaveClustersToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/clusters/hotspots.json","text":"{JsonEscape(MessageText(Local.HotspotClusters))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: tech_save_clusters
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveClustersToolCall)
      output:
        messages: Local.SaveClustersResult

    - kind: SendActivity
      id: tech_step3_start
      activity: "3/4 生成洞察中..."

    - kind: SetTextVariable
      id: tech_build_insight_prompt
      variable: Local.InsightPrompt
      value: |
        你是 Tech Insight Agent。任务：针对每个热点输出“发生了什么/为什么重要/影响谁/接下来怎么做”。
        
        ## 输入：热点聚类结果（严格 JSON）
        {MessageText(Local.HotspotClusters)}
        
        ## 输出（严格 JSON）
        {"insights": [{"hotspot_id": "H01", "title": "...", "what_changed": "...", "why_it_matters": "...", "who_is_impacted": [], "next_actions": [], "risk_notes": [], "references": []}]}

    - kind: InvokeAzureAgent
      id: tech_insight_llm
      agent:
        name: InsightAgent
      input:
        messages: =UserMessage(Local.InsightPrompt)
      output:
        messages: Local.InsightsCandidate

    - kind: SetTextVariable
      id: tech_build_insight_fallback_toolcall
      variable: Local.InsightFallbackToolCall
      value: '{"tool":"tech.insight_or_fallback","args":{"clusters_json":"{JsonEscape(MessageText(Local.HotspotClusters))}","insights_json":"{JsonEscape(MessageText(Local.InsightsCandidate))}"}}'

    - kind: InvokeAzureAgent
      id: tech_insight
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.InsightFallbackToolCall)
      output:
        messages: Local.HotspotInsights

    - kind: SetTextVariable
      id: tech_save_insights_toolcall
      variable: Local.SaveInsightsToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/insights/insights.json","text":"{JsonEscape(MessageText(Local.HotspotInsights))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: tech_save_insights
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveInsightsToolCall)
      output:
        messages: Local.SaveInsightsResult

    - kind: SendActivity
      id: tech_step4_start
      activity: "4/4 生成报告中..."

    - kind: SetTextVariable
      id: tech_build_report_prompt
      variable: Local.ReportPrompt
      value: |
        你是 Tech Report Writer。
        请基于聚类与洞察生成一份 Markdown 报告（中英混合可接受，但以中文为主），结构包含：
        - 24h 摘要
        - Cross-source Trends（趋势）
        - High-signal Singles（重要单条更新）
        - Company Radar（公司雷达）
        - DevTools Releases（工具链更新）
        - Research Watch（研究趋势）
        
        ## 输入：聚类（JSON）
        {MessageText(Local.HotspotClusters)}
        
        ## 输入：洞察（JSON）
        {MessageText(Local.HotspotInsights)}
        
        输出 Markdown，不要代码块。

    - kind: InvokeAzureAgent
      id: tech_report_llm
      agent:
        name: ContentStrategyAgent
      input:
        messages: =UserMessage(Local.ReportPrompt)
      output:
        messages: Local.ReportCandidate

    - kind: SetTextVariable
      id: tech_build_report_fallback_toolcall
      variable: Local.ReportFallbackToolCall
      value: '{"tool":"tech.render_report_or_fallback","args":{"clusters_json":"{JsonEscape(MessageText(Local.HotspotClusters))}","insights_json":"{JsonEscape(MessageText(Local.HotspotInsights))}","draft_markdown":"{JsonEscape(MessageText(Local.ReportCandidate))}"}}'

    - kind: InvokeAzureAgent
      id: tech_render_report
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.ReportFallbackToolCall)
      output:
        messages: Local.FinalMarkdown

    - kind: SetTextVariable
      id: tech_save_report_toolcall
      variable: Local.SaveReportToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/report.md","text":"{JsonEscape(MessageText(Local.FinalMarkdown))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: tech_save_report
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveReportToolCall)
      output:
        messages: Local.SaveReportResult

    - kind: SendActivity
      id: tech_done
      activity: |
        ✅ Tech Insight Workflow 完成！
        - 报告：{Local.OutputDir}/report.md

    - kind: EndConversation
      id: tech_end
