# Social Insight Workflow - 多平台热点分析 -> 可执行社交媒体内容投放建议
kind: Workflow
trigger:
  kind: OnConversationStart
  id: social_insight_workflow
  actions:
    - kind: SendActivity
      id: social_welcome
      activity: |
        🔥 欢迎使用 Social Insight 多平台热点分析工作流！
        目标：从多平台热点 API 拉取热点信号 → 聚类成"核心热点" → 洞察热点成因与情绪结构 → 生成平台级内容投放建议。
        你将得到一份《热点 × 内容投放建议》报告（不直接代写成品内容）。

    - kind: SetTextVariable
      id: social_set_language
      variable: Local.Language
      value: "zh-CN"

    - kind: SetTextVariable
      id: social_set_api_list_path
      variable: Local.ApiListPath
      value: "input/api/hot_api_list.json"

    - kind: SetTextVariable
      id: social_set_output_dir
      variable: Local.OutputDir
      value: "{Local.RunOutputDir}"

    - kind: SetTextVariable
      id: social_set_signals_dir
      variable: Local.SignalsDir
      value: "{Local.RunOutputDir}/signals"

    - kind: SetTextVariable
      id: social_set_target_platforms
      variable: Local.TargetPlatforms
      value: "Podcast / 公众号 / Blog / 小红书 / 短视频"

    - kind: SetTextVariable
      id: social_set_top_k
      variable: Local.TopK
      value: "8"

    - kind: SetTextVariable
      id: social_set_max_items_per_source
      variable: Local.MaxItemsPerSource
      value: "30"

    - kind: SetTextVariable
      id: social_set_timeout_seconds
      variable: Local.TimeoutSeconds
      value: "15"

    - kind: SetTextVariable
      id: social_set_max_chars
      variable: Local.MaxChars
      value: "200000"

    - kind: SendActivity
      id: social_step1_start
      activity: |
        1/4 抓取热点信号中...
        - API 列表: {Local.ApiListPath}
        - 落盘目录: {Local.SignalsDir}

    - kind: SetTextVariable
      id: social_build_fetch_toolcall
      variable: Local.FetchSignalsToolCall
      value: '{"tool":"social.fetch_all_to_disk","args":{"api_list_path":"{Local.ApiListPath}","output_dir":"{Local.SignalsDir}","timeout_seconds":{Local.TimeoutSeconds},"max_chars":{Local.MaxChars}}}'

    - kind: InvokeAzureAgent
      id: social_fetch_signals
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.FetchSignalsToolCall)
      output:
        messages: Local.FetchResult

    - kind: SendActivity
      id: social_step1_fetch_done
      activity: "✅ 热点信号抓取完成，已落盘到 {Local.SignalsDir}"

    - kind: SetTextVariable
      id: social_build_load_toolcall
      variable: Local.LoadSignalsToolCall
      value: '{"tool":"social.load_signals_from_disk","args":{"signals_dir":"{Local.SignalsDir}","max_items_per_source":{Local.MaxItemsPerSource}}}'

    - kind: InvokeAzureAgent
      id: social_load_signals
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.LoadSignalsToolCall)
      output:
        messages: Local.RawSignals

    - kind: SetTextVariable
      id: social_save_raw_signals_toolcall
      variable: Local.SaveRawSignalsToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/raw_signals.json","text":"{JsonEscape(MessageText(Local.RawSignals))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: social_save_raw_signals
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveRawSignalsToolCall)
      output:
        messages: Local.SaveRawSignalsResult

    - kind: SendActivity
      id: social_step2_start
      activity: |
        2/4 聚类核心热点中...
        - 目标输出热点数: Top {Local.TopK}

    - kind: SetTextVariable
      id: social_build_clustering_prompt
      variable: Local.ClusteringPrompt
      value: |
        你是 Hotspot Clustering Agent。任务是把"表面不同、实质相同"的热点信号归并为同一个热点主题。
        ## 输入：原始热点信号池（JSON，跨平台）
        {MessageText(Local.RawSignals)}
        ## 业务优先级（用于筛选/排序/should_chase）
        - 低优先级：政治/国家/外交/涉军等（原则：谨慎追，只做权威转述/科普，避免评论性扩写）
        - 高优先级：技术/经济/财经/商业（原则：更值得追，优先进入 TopK，并给出更强的行动建议）
        - 正常优先级：体育/明星/娱乐（原则：可追，但控制资源投入与风险）
        ## 强约束
        - 必须输出严格 JSON（不要代码块，不要解释）
        - hotspots 数量最多 {Local.TopK}
        - 每个热点给出 signals（至少 3 条样本）
        ## 输出格式（严格 JSON）
        {"hotspots": [{"hotspot_id": "H01", "title": "...", "summary": "...", "overall_heat_score": 0, "platform_coverage_count": 0, "platforms": [], "should_chase": "yes", "chase_rationale": [], "signals": [{"platform": "...", "rank": 1, "title": "...", "url": "...", "hot_score": 0}]}]}

    - kind: InvokeAzureAgent
      id: social_cluster_hotspots_llm
      agent:
        name: HotspotClusteringAgent
      input:
        messages: =UserMessage(Local.ClusteringPrompt)
      output:
        messages: Local.ClustersCandidate

    - kind: SetTextVariable
      id: social_build_cluster_fallback_toolcall
      variable: Local.ClusterFallbackToolCall
      value: '{"tool":"social.cluster_or_fallback","args":{"raw_signals_json":"{JsonEscape(MessageText(Local.RawSignals))}","clusters_json":"{JsonEscape(MessageText(Local.ClustersCandidate))}","top_k":{Local.TopK}}}'

    - kind: InvokeAzureAgent
      id: social_cluster_hotspots
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.ClusterFallbackToolCall)
      output:
        messages: Local.HotspotClusters

    - kind: SetTextVariable
      id: social_save_clusters_toolcall
      variable: Local.SaveClustersToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/clusters/hotspots.json","text":"{JsonEscape(MessageText(Local.HotspotClusters))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: social_save_clusters
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveClustersToolCall)
      output:
        messages: Local.SaveClustersResult

    - kind: SendActivity
      id: social_step3_start
      activity: "3/4 洞察分析中..."

    - kind: SetTextVariable
      id: social_build_insight_prompt
      variable: Local.InsightPrompt
      value: |
        你是 Insight Agent。任务是回答：这个热点为什么会火？在传播什么情绪？
        ## 输入：热点聚类结果（JSON）
        {MessageText(Local.HotspotClusters)}
        ## 分析维度
        - 触发原因、核心人群、情绪结构、内容属性、风险提示
        ## 输出（严格 JSON）
        {"insights": [{"hotspot_id": "H01", "title": "...", "trigger": "...", "core_audience": "...", "emotion_structure": {"primary": "...", "secondary": "...", "notes": "..."}, "content_affordance": [], "risk_notes": []}]}

    - kind: InvokeAzureAgent
      id: social_insight_llm
      agent:
        name: InsightAgent
      input:
        messages: =UserMessage(Local.InsightPrompt)
      output:
        messages: Local.InsightsCandidate

    - kind: SetTextVariable
      id: social_build_insight_fallback_toolcall
      variable: Local.InsightFallbackToolCall
      value: '{"tool":"social.insight_or_fallback","args":{"clusters_json":"{JsonEscape(MessageText(Local.HotspotClusters))}","insights_json":"{JsonEscape(MessageText(Local.InsightsCandidate))}"}}'

    - kind: InvokeAzureAgent
      id: social_insight
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.InsightFallbackToolCall)
      output:
        messages: Local.HotspotInsights

    - kind: SetTextVariable
      id: social_save_insights_toolcall
      variable: Local.SaveInsightsToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/insights/insights.json","text":"{JsonEscape(MessageText(Local.HotspotInsights))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: social_save_insights
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveInsightsToolCall)
      output:
        messages: Local.SaveInsightsResult

    - kind: SendActivity
      id: social_step4_start
      activity: "4/4 生成平台投放建议报告中..."

    - kind: SetTextVariable
      id: social_build_strategy_prompt
      variable: Local.StrategyPrompt
      value: |
        你是 Content Strategy Agent。把"热点洞察"转化为可直接执行的"平台级内容决策建议"。
        ## 输入 1：热点聚类（JSON）
        {MessageText(Local.HotspotClusters)}
        ## 输入 2：洞察卡片（JSON）
        {MessageText(Local.HotspotInsights)}
        ## 需要覆盖的平台
        {Local.TargetPlatforms}
        ## 业务优先级（用于建议强度）
        - 低优先级（政治/国家等）：建议以“权威转述/科普/操作指引”为主，措辞中性，显式给出风险控制。
        - 高优先级（技术/经济等）：给出更强的选题角度、标题方向、结构/脚本与发布节奏建议。
        - 正常优先级（体育/明星等）：建议可执行，但控制篇幅与资源，避免过度延展。
        ## 强约束
        - 输出为中文 Markdown
        - 每个热点包含：热点简述、洞察结论、值不值得追、各平台建议

    - kind: InvokeAzureAgent
      id: social_generate_report_llm
      agent:
        name: ContentStrategyAgent
      input:
        messages: =UserMessage(Local.StrategyPrompt)
      output:
        messages: Local.ReportCandidate

    - kind: SetTextVariable
      id: social_build_report_fallback_toolcall
      variable: Local.ReportFallbackToolCall
      value: '{"tool":"social.render_report_or_fallback","args":{"raw_signals_json":"{JsonEscape(MessageText(Local.RawSignals))}","clusters_json":"{JsonEscape(MessageText(Local.HotspotClusters))}","insights_json":"{JsonEscape(MessageText(Local.HotspotInsights))}","report_markdown":"{JsonEscape(MessageText(Local.ReportCandidate))}"}}'

    - kind: InvokeAzureAgent
      id: social_render_report
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.ReportFallbackToolCall)
      output:
        messages: Local.FinalMarkdown

    - kind: SetTextVariable
      id: social_save_report_toolcall
      variable: Local.SaveReportToolCall
      value: '{"tool":"write_text_file","args":{"path":"{Local.OutputDir}/report.md","text":"{JsonEscape(MessageText(Local.FinalMarkdown))}","overwrite":true}}'

    - kind: InvokeAzureAgent
      id: social_save_report
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SaveReportToolCall)
      output:
        messages: Local.SaveReportResult

    - kind: SendActivity
      id: social_done
      activity: |
        ✅ Social Insight 报告生成完成！
        - 输出目录: {Local.OutputDir}
        - 报告: {Local.OutputDir}/report.md

    - kind: EndConversation
      id: social_end
